name: UiPath Robot Execution

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      process_name:
        description: 'Process name to execute'
        required: true
        default: 'Main'

env:
  UIPATH_CLI_VERSION: '22.10.8432.18709'
  PROJECT_PATH: '.'

jobs:
  run-uipath-robot:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '6.0.x'
        
    - name: Install UiPath CLI
      run: |
        Invoke-WebRequest -Uri "https://www.myget.org/F/uipath-dev/api/v2/package/UiPath.CLI/${{ env.UIPATH_CLI_VERSION }}" -OutFile "UiPath.CLI.nupkg"
        Expand-Archive -Path "UiPath.CLI.nupkg" -DestinationPath "UiPath.CLI"
        $env:PATH += ";$(Get-Location)\UiPath.CLI\tools"
        echo "$(Get-Location)\UiPath.CLI\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      shell: powershell
      
    - name: Authenticate UiPath
      run: |
        uipcli auth login --token ${{ secrets.UIPATH_API_TOKEN }} --url ${{ secrets.UIPATH_ORCHESTRATOR_URL }}
      shell: powershell
      
    - name: Package UiPath Project
      run: |
        uipcli package pack ${{ env.PROJECT_PATH }} --output-type Process
      shell: powershell
      
    - name: Deploy to Orchestrator
      run: |
        uipcli package deploy ${{ env.PROJECT_PATH }} ${{ secrets.UIPATH_ORCHESTRATOR_URL }} ${{ secrets.UIPATH_ORCHESTRATOR_TENANT }} --token ${{ secrets.UIPATH_API_TOKEN }}
      shell: powershell
      
    - name: Run UiPath Process
      run: |
        $processName = "${{ github.event.inputs.process_name || 'Main' }}"
        .\scripts\run-uipath-robot.ps1 -ProcessName $processName
      shell: powershell
      
    - name: Upload Logs
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: uipath-logs
        path: logs/